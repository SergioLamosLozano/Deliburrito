<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Deli Burrito</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-red-700 via-red-600 to-yellow-500 flex items-center justify-center p-4">
  <div class="w-full max-w-md bg-white rounded-3xl shadow-2xl p-8">
    <div class="text-center mb-8">
      <div class="bg-white rounded-full p-4 inline-block mb-4 shadow-sm">
        <img src="/deliburrit.webp" alt="Deli Burrito" class="h-32 w-auto opacity-90" />
      </div>
      <h1 class="text-4xl font-black text-red-700">Deli<span class="text-yellow-500">Burrito</span></h1>
      <p class="text-gray-500 mt-1 font-bold uppercase text-xs tracking-widest">Panel de Administracion</p>
    </div>

    <form id="loginForm" class="space-y-5">
      <div>
        <label class="block text-xs font-black text-gray-400 uppercase tracking-widest mb-2">Email</label>
        <input id="email" type="email" autocomplete="email"
          class="w-full border-2 border-gray-100 bg-gray-50 rounded-2xl px-4 py-3 focus:outline-none focus:border-red-500 font-bold transition-all" />
      </div>
      <div>
        <label class="block text-xs font-black text-gray-400 uppercase tracking-widest mb-2">Contrasena</label>
        <input id="password" type="password" autocomplete="current-password"
          class="w-full border-2 border-gray-100 bg-gray-50 rounded-2xl px-4 py-3 focus:outline-none focus:border-red-500 font-bold transition-all" />
      </div>
      <button id="submitBtn" type="submit"
        class="w-full bg-red-600 hover:bg-red-700 text-white font-black py-4 rounded-2xl transition-all shadow-lg uppercase tracking-widest text-sm active:scale-95">
        Acceder
      </button>
    </form>

    <p id="errorMsg" class="hidden mt-4 text-sm text-red-700 bg-red-50 border border-red-200 rounded-2xl p-3 font-bold text-center"></p>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const errorMsg = document.getElementById('errorMsg');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.classList.add('hidden');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Verificando...';

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/index.php?route=admin-login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
          credentials: 'include'
        });

        const data = await res.json();

        if (data.ok) {
          sessionStorage.setItem('deliburrito_admin_session', data.token);
          window.location.href = '/admin/';
        } else {
          errorMsg.textContent = data.message || 'Credenciales invalidas.';
          errorMsg.classList.remove('hidden');
        }
      } catch (err) {
        errorMsg.textContent = 'Error de conexion. Intenta de nuevo.';
        errorMsg.classList.remove('hidden');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Acceder';
      }
    });
  </script>
</body>
</html>
