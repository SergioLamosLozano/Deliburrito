<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login - Deli Burrito</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-red-700 via-red-600 to-yellow-500 flex items-center justify-center p-4">
  <div class="w-full max-w-md bg-white rounded-3xl shadow-2xl p-8">
    <div class="text-center mb-8">
      <h1 class="text-4xl font-black text-red-700">Deli<span class="text-yellow-500">Burrito</span></h1>
      <p class="text-gray-600 mt-2">Panel de Administración</p>
    </div>

    <form id="loginForm" class="space-y-5">
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">Email</label>
        <input id="email" type="email" value="admin@example.com" class="w-full border rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-red-300" />
      </div>
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">Contraseña</label>
        <input id="password" type="password" value="password" class="w-full border rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-red-300" />
      </div>
      <button class="w-full bg-red-700 hover:bg-red-800 text-white font-bold py-3 rounded-xl transition">
        Entrar al Admin
      </button>
    </form>

    <p id="error" class="hidden mt-4 text-sm text-red-700 bg-red-50 border border-red-200 rounded-xl p-3"></p>

    <div class="mt-6 text-sm text-gray-600 bg-yellow-50 rounded-xl p-4">
      Demo: <strong>admin@example.com</strong> / <strong>password</strong>
    </div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const errorBox = document.getElementById('error');

    form.addEventListener('submit', (event) => {
      event.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if ((email === 'admin@example.com' && password === 'password') || (email === 'admin@deliburrito.local' && password === 'password')) {
        localStorage.setItem('deliburrito_admin', JSON.stringify({ email }));
        window.location.href = '/admin/';
        return;
      }

      errorBox.textContent = 'Credenciales inválidas. Usa admin@example.com / password.';
      errorBox.classList.remove('hidden');
    });
  </script>
</body>
</html>
